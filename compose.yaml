services:
  web:
    build:
      context: ./backend
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-webdev_batangas}
      DB_USER: ${DB_USER:-webdev}
      DB_PASSWORD: ${DB_PASSWORD:-webdev_dev}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-webdev_batangas}
      MYSQL_USER: ${DB_USER:-webdev}
      MYSQL_PASSWORD: ${DB_PASSWORD:-webdev_dev}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_dev}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
