services:
  frontend:
    build:
      context: ./frontend/react
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/react:/app
      - react_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://web
    depends_on:
      - web

  web:
    build:
      context: ./backend
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-webdev_batangas}
      DB_USER: ${DB_USER:-webdev}
      DB_PASSWORD: ${DB_PASSWORD:-webdev_dev}
      UPLOADS_PATH: /var/www/uploads
    volumes:
      - .:/var/www/html
      - upload_data:/var/www/uploads/listings
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-webdev_batangas}
      MYSQL_USER: ${DB_USER:-webdev}
      MYSQL_PASSWORD: ${DB_PASSWORD:-webdev_dev}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_dev}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  react_node_modules:
  upload_data:
